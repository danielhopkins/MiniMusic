name: MiniMusic
configs:
  Debug: debug
  Release: release
options:
  bundleIdPrefix: com.dhopkins
  deploymentTarget:
    macOS: "27.0"
  xcodeVersion: "27.0"
  minimumXcodeGenVersion: "2.38"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    majorVersion: 2.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    majorVersion: 2.0.0

targets:
  MiniMusic:
    type: application
    platform: macOS
    sources:
      - MiniMusic
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boulderhopkins.MiniMusic
        MARKETING_VERSION: "26.723.0"
        CURRENT_PROJECT_VERSION: "20"
        SWIFT_VERSION: "6.2"
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        DEVELOPMENT_TEAM: 25RCAA3JLJ
        GENERATE_INFOPLIST_FILE: true
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          SWIFT_OPTIMIZATION_LEVEL: -O
          GCC_OPTIMIZATION_LEVEL: s
          SWIFT_COMPILATION_MODE: wholemodule
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          COPY_PHASE_STRIP: true
          STRIP_INSTALLED_PRODUCT: true
    info:
      path: MiniMusic/Info.plist
      properties:
        LSUIElement: true
        SUFeedURL: "https://danielhopkins.github.io/MiniMusic/appcast.xml"
        SUPublicEDKey: "tWN9BPX76XAcg0LFWtnQ9uKBCeDSM59qkfn1ioAo2JY="
        NSAppleMusicUsageDescription: "MiniMusic needs access to your Apple Music library to play music and show your playlists."
    entitlements:
      path: MiniMusic/MiniMusic.entitlements

  MiniMusicTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      # Compiled directly in so these run hostless (no app launch needed).
      - MiniMusic/Utilities/CatalogueReference.swift
      - MiniMusic/Utilities/ClassicalTitle.swift
      - MiniMusic/Utilities/ComposerName.swift
      - MiniMusic/Models/SearchCategory.swift
      - MiniMusic/Utilities/SearchQueryParser.swift
      - MiniMusic/Utilities/SearchPlanner.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boulderhopkins.MiniMusicTests
        SWIFT_VERSION: "6.2"
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        GENERATE_INFOPLIST_FILE: true

schemes:
  MiniMusicTests:
    build:
      targets:
        MiniMusicTests: [test]
    test:
      targets:
        - MiniMusicTests
